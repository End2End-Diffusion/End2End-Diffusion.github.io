<script>

end_y": [0.6403671360014537, 0.5239835947117722]}, {"key": "dpgbench", "label": "DPG-Bench", "r": -0.6421538717336163, "p": 0.000716810971313558, "trend_x": [2.08, 21.72], "trend_y": [0.8231995751211741, 0.7873774568113927]}, {"key": "genaibench", "label": "GenAIBench", "r": -0.8114786247763668, "p": 1.4958526631022486e-06, "trend_x": [2.08, 21.72], "trend_y": [0.7160844618232217, 0.665525250663783]}, {"key": "simpleeval", "label": "SimpleEval", "r": -0.843854221940076, "p": 2.2095221341387598e-07, "trend_x": [2.08, 21.72], "trend_y": [0.5395253981710676, 0.30826041434954027]}], "categories": {"RAE": {"label": "Latent (RAE)", "color": "#3498DB", "symbol": "circle"}, "VAE": {"label": "Latent (VAE)", "color": "#C0392B", "symbol": "square"}, "E2E": {"label": "Latent (VAE + REPA-E)", "color": "#8E44AD", "symbol": "diamond"}, "Pixel": {"label": "Pixel-space", "color": "#27AE60", "symbol": "triangle-up"}}, "xcol": "fid_nocfg", "xlabel": "← ImageNet FID (w/o CFG)", "rows": 2, "cols": 2};

const _fig = document.getElementById("fig");
if (D.rows === 1) { _fig.style.maxWidth = "1440px"; _fig.style.height = "410px"; }
else { _fig.style.maxWidth = "100%"; _fig.style.height = "480px"; }

// Theme palette — read the host post's CSS variables so the figure matches
// light/dark. Background stays transparent (blends with the parent); only
// foreground colors flip. Falls back to light defaults if opened standalone.
function readVar(name, fallback) {
  try {
    const v = window.parent.getComputedStyle(window.parent.document.documentElement)
              .getPropertyValue(name).trim();
    return v || fallback;
  } catch (e) { return fallback; }
}
function palette() {
  return {
    bg:      readVar("--post-bg", "#fff"),
    text:    readVar("--post-text", "#222"),
    muted:   readVar("--post-text-muted", "#666"),
    border:  readVar("--post-border", "#999"),
    grid:    readVar("--post-border-light", "#eee"),
    surface: readVar("--post-surface", "#fff"),
  };
}
let P = palette();

const axisFor = i => i === 0 ? ["x","y"] : ["x"+(i+1), "y"+(i+1)];
const recsByCat = cat => D.records.filter(r => r.category === cat);

const fidLabel = D.xlabel.replace("← ImageNet ", "");   // "FID (w/ CFG)" or "FID (w/o CFG)"
const hoverTemplate =
  "<b>%{customdata[0]}</b><br>" + fidLabel + ": %{customdata[1]:.2f}<br>" +
  D.panels.map((p, k) => p.label + ": %{customdata[" + (k + 2) + "]:.3f}").join("<br>") +
  "<extra></extra>";
const customFor = recs => recs.map(r => [r.method, r[D.xcol], ...D.panels.map(p => r[p.key])]);

const traces = [];
const trendIdxForPanel = {};   // panel index -> trend-line trace index
const scatterTraces = [];      // {idx, panel} for every scatter (category) trace
D.panels.forEach((panel, i) => {
  const [ax, ay] = axisFor(i);
  Object.entries(D.categories).forEach(([cat, style]) => {
    const recs = recsByCat(cat);
    scatterTraces.push({ idx: traces.length, panel: i });
    traces.push({
      type: "scatter", mode: "markers",
      xaxis: ax, yaxis: ay,
      meta: { panel: i },
      x: recs.map(r => r[D.xcol]),
      y: recs.map(r => r[panel.key]),
      name: style.label,
      legendgroup: cat,
      showlegend: i === 0,
      visible: cat === "Pixel" ? "legendonly" : true,   // pixel-space off by default; click legend to show
      marker: { size: 7, color: style.color, symbol: style.symbol,
                line: { color: P.bg, width: 1 } },
      selected:   { marker: { opacity: 1.0, size: 9 } },
      unselected: { marker: { opacity: 0.15 } },
      customdata: customFor(recs),
      hovertemplate: hoverTemplate,
    });
  });
  trendIdxForPanel[i] = traces.length;
  traces.push({
    type: "scatter", mode: "lines",
    xaxis: ax, yaxis: ay,
    x: panel.trend_x, y: panel.trend_y,
    line: { color: P.muted, width: 2, dash: "dash" },
    hoverinfo: "skip", showlegend: false,
  });
});

const layout = {
  grid: { rows: D.rows, columns: D.cols, pattern: "independent",
          xgap: (D.rows === 1 ? 0.26 : 0.18), ygap: 0.28 },
  margin: { l: 46, r: 14, t: 52, b: 40 },
  font: { size: 10, color: P.text },
  legend: { orientation: "h", x: 0.5, xanchor: "center", y: (D.rows === 1 ? 1.28 : 1.13), font: { size: 11, color: P.text } },
  hovermode: "closest",
  hoverlabel: { bgcolor: P.surface, bordercolor: P.border, font: { family: "monospace", size: 11, color: P.text } },
  annotations: [],
  paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)",
};

const annIndexForPanel = {};   // panel index -> layout.annotations index
D.panels.forEach((panel, i) => {
  const [ax, ay] = axisFor(i);
  const xa = "xaxis" + (i === 0 ? "" : (i+1));
  const ya = "yaxis" + (i === 0 ? "" : (i+1));
  const spine = { showline: true, linecolor: P.text, linewidth: 1, mirror: false,
                  ticks: "outside", tickcolor: P.text, ticklen: 4, tickwidth: 1 };
  layout[xa] = Object.assign({ title: { text: D.xlabel, font: { size: 11, color: P.text } }, tickfont: { size: 9, color: P.muted }, gridcolor: P.grid, zeroline: false }, spine);
  layout[ya] = Object.assign({ title: { text: panel.label + " →", font: { size: 11, color: P.text } }, tickfont: { size: 9, color: P.muted }, gridcolor: P.grid, zeroline: false }, spine);
  annIndexForPanel[i] = layout.annotations.length;
  layout.annotations.push({
    xref: ax + " domain", yref: ay + " domain",
    x: 0.96, y: 0.96, xanchor: "right", yanchor: "top",
    text: statsText(panel.r, panel.p, D.records.length),
    showarrow: false, align: "right",
    font: { size: 9, family: "monospace", color: P.text },
    bgcolor: P.surface, bordercolor: P.border, borderwidth: 1, borderpad: 3,
  });
});

// ---- stats helpers (recompute r, p, n for a selected subset) ----
function statsText(r, p, n) {
  const pstr = (p === null) ? "n/a" : (p >= 1e-3 ? p.toFixed(3) : "<0.001");
  const rstr = (r === null) ? "n/a" : r.toFixed(3);
  return "r = " + rstr + "<br>p = " + pstr + "<br>n = " + n;
}
function pearson(xs, ys) {
  const n = xs.length;
  if (n < 2) return null;
  const mx = xs.reduce((a,b)=>a+b,0)/n, my = ys.reduce((a,b)=>a+b,0)/n;
  let sxy=0, sxx=0, syy=0;
  for (let i=0;i<n;i++){ const dx=xs[i]-mx, dy=ys[i]-my; sxy+=dx*dy; sxx+=dx*dx; syy+=dy*dy; }
  if (sxx===0 || syy===0) return null;
  return sxy/Math.sqrt(sxx*syy);
}
function fitLine(xs, ys) {
  const n = xs.length;
  if (n < 2) return null;
  const mx = xs.reduce((a,b)=>a+b,0)/n, my = ys.reduce((a,b)=>a+b,0)/n;
  let sxy=0, sxx=0;
  for (let i=0;i<n;i++){ const dx=xs[i]-mx; sxy+=dx*(ys[i]-my); sxx+=dx*dx; }
  if (sxx===0) return null;
  const slope = sxy/sxx, intercept = my - slope*mx;
  const xlo = Math.min(...xs), xhi = Math.max(...xs);
  return { x: [xlo, xhi], y: [slope*xlo+intercept, slope*xhi+intercept] };
}
function gammaln(x){
  const c=[76.18009172947146,-86.50532032941677,24.01409824083091,
           -1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
  let y=x, t=x+5.5; t-=(x+0.5)*Math.log(t); let s=1.000000000190015;
  for(let j=0;j<6;j++){ y+=1; s+=c[j]/y; }
  return -t+Math.log(2.5066282746310005*s/x);
}
function betacf(a,b,x){
  const FPMIN=1e-300; let qab=a+b, qap=a+1, qam=a-1;
  let c=1, d=1-qab*x/qap; if(Math.abs(d)<FPMIN)d=FPMIN; d=1/d; let h=d;
  for(let m=1;m<=200;m++){
    const m2=2*m;
    let aa=m*(b-m)*x/((qam+m2)*(a+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d; h*=d*c;
    aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
    d=1+aa*d; if(Math.abs(d)<FPMIN)d=FPMIN; c=1+aa/c; if(Math.abs(c)<FPMIN)c=FPMIN; d=1/d;
    const del=d*c; h*=del; if(Math.abs(del-1)<3e-7) break;
  }
  return h;
}
function betai(a,b,x){
  if(x<=0) return 0; if(x>=1) return 1;
  const bt=Math.exp(gammaln(a+b)-gammaln(a)-gammaln(b)+a*Math.log(x)+b*Math.log(1-x));
  return x<(a+1)/(a+b+2) ? bt*betacf(a,b,x)/a : 1-bt*betacf(b,a,1-x)/b;
}
function pValue(r, n){
  if(r===null || n<3) return null;
  const df=n-2; const rr=Math.min(Math.max(r,-0.999999999),0.999999999);
  const t2=rr*rr*df/(1-rr*rr);
  return betai(df/2, 0.5, df/(df+t2));  // two-sided
}

const fig = document.getElementById("fig");
let selection = null;   // panel -> {x,y} from a box-select, or null when none active
let suppress = false;   // guard so our own trend restyle doesn't re-trigger render()

Plotly.newPlot(fig, traces, layout, {responsive: true, displaylogo: false,
  modeBarButtonsToRemove: ["lasso2d"]}).then(() => {
  Plotly.relayout(fig, {dragmode: "select"});
  render();   // pixel-space hidden by default -> recompute stats/trend for the visible (latent) set
});

// Re-color the figure when the host toggles light/dark.
function applyTheme() {
  P = palette();
  const up = {
    "font.color": P.text,
    "legend.font.color": P.text,
    "hoverlabel.bgcolor": P.surface,
    "hoverlabel.bordercolor": P.border,
    "hoverlabel.font.color": P.text,
  };
  D.panels.forEach((panel, i) => {
    [(i === 0 ? "xaxis" : "xaxis" + (i+1)), (i === 0 ? "yaxis" : "yaxis" + (i+1))].forEach(a => {
      up[a + ".linecolor"] = P.text;
      up[a + ".tickcolor"] = P.text;
      up[a + ".gridcolor"] = P.grid;
      up[a + ".tickfont.color"] = P.muted;
      up[a + ".title.font.color"] = P.text;
    });
    const ai = annIndexForPanel[i];
    up["annotations[" + ai + "].font.color"] = P.text;
    up["annotations[" + ai + "].bgcolor"] = P.surface;
    up["annotations[" + ai + "].bordercolor"] = P.border;
  });
  Plotly.relayout(fig, up);
  Plotly.restyle(fig, { "line.color": P.muted }, Object.values(trendIdxForPanel));
  Plotly.restyle(fig, { "marker.line.color": P.bg }, scatterTraces.map(s => s.idx));
}
try {
  const root = window.parent.document.documentElement;
  new MutationObserver(muts => {
    if (muts.some(m => m.attributeName === "data-theme")) applyTheme();
  }).observe(root, { attributes: true, attributeFilter: ["data-theme"] });
} catch (e) { /* standalone / cross-origin — no live theming */ }

function visiblePanelPts() {
  const m = {};
  scatterTraces.forEach(st => {
    const tr = fig.data[st.idx];
    if (tr.visible === "legendonly") return;          // hidden via legend
    const a = (m[st.panel] = m[st.panel] || {x:[], y:[]});
    for (let k = 0; k < tr.x.length; k++) { a.x.push(tr.x[k]); a.y.push(tr.y[k]); }
  });
  return m;
}

function render() {
  const base = visiblePanelPts();
  const annUpdate = {}, tX = [], tY = [], tIdx = [];
  D.panels.forEach((panel, i) => {
    const ai = annIndexForPanel[i];
    const pts = (selection && selection[i] && selection[i].x.length) ? selection[i] : base[i];
    tIdx.push(trendIdxForPanel[i]);
    if (pts && pts.x.length >= 1) {
      const r = pearson(pts.x, pts.y);
      annUpdate["annotations[" + ai + "].text"] = statsText(r, pValue(r, pts.x.length), pts.x.length);
      const line = fitLine(pts.x, pts.y);
      tX.push(line ? line.x : []); tY.push(line ? line.y : []);
    } else {
      annUpdate["annotations[" + ai + "].text"] = statsText(null, null, 0);
      tX.push([]); tY.push([]);                       // nothing visible -> no line
    }
  });
  suppress = true;
  Plotly.restyle(fig, { x: tX, y: tY }, tIdx).then(() => { suppress = false; });
  Plotly.relayout(fig, annUpdate);
}

fig.on("plotly_selected", (ev) => {
  const m = {};
  if (ev && ev.points) ev.points.forEach(pt => {
    const pidx = pt.data.meta ? pt.data.meta.panel : null;
    if (pidx === null || pidx === undefined) return;
    (m[pidx] = m[pidx] || {x:[], y:[]});
    m[pidx].x.push(pt.x); m[pidx].y.push(pt.y);
  });
  selection = m; render();
});
fig.on("plotly_deselect", () => { selection = null; render(); });   // double-click clears
fig.on("plotly_restyle", () => { if (!suppress) render(); });        // legend toggles
})();
</script>
